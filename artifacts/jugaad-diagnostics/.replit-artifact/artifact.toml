kind = "web"
previewPath = "/"
title = "Jugaad Diagnostics"
version = "1.0.0"
id = "artifacts/jugaad-diagnostics"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26079

[services.development]
run = "pnpm --filter @workspace/jugaad-diagnostics run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/jugaad-diagnostics", "run", "build" ]
publicDir = "artifacts/jugaad-diagnostics/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26079"
BASE_PATH = "/"
